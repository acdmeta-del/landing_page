name: Atualizar avaliações do Google

# DORMENTE: o agendamento diário foi desativado porque optamos por manter as
# avaliações manualmente no reviews.json (sem depender da conta paga do Google Cloud).
# Se um dia você ativar a Places API (New) com faturamento, basta descomentar o
# bloco "schedule" abaixo e configurar os secrets/variables (ver README).
on:
  # schedule:
  #   - cron: '0 9 * * *'   # todos os dias às 09:00 UTC (~06:00 em Lajedo)
  workflow_dispatch:       # por ora, só roda manualmente pela aba Actions

permissions:
  contents: write          # necessário para commitar o reviews.json atualizado

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Buscar avaliações no Google
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          PLACE_ID: ${{ vars.GOOGLE_PLACE_ID }}
        run: node scripts/fetch-reviews.mjs

      - name: Commitar se houver mudança
        run: |
          if ! git diff --quiet -- reviews.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add reviews.json
            git commit -m "chore: atualiza avaliações do Google [skip ci]"
            git push
          else
            echo "Sem mudanças nas avaliações."
          fi
