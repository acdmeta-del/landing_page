server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão para acelerar o carregamento
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Imagens e assets: cache longo (troque o nome do arquivo para forçar atualização)
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # Avaliações do Google: sempre buscar a versão mais recente
    location = /reviews.json {
        add_header Cache-Control "no-cache";
    }

    # HTML: sem cache agressivo, para refletir mudanças na hora
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Página de erro amigável cai no index
    error_page 404 /index.html;
}
